<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring 2026 — Premium Card</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,600&family=Montserrat:wght@100;300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --accent: #ff8fab;
            --card-glass: rgba(255, 255, 255, 0.03);
            --transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            transition: background 1.5s ease;
        }

        body.active { background-color: #fffafb; }

        /* Фоновое пятно света */
        .spotlight {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 143, 171, 0.15) 0%, transparent 70%);
            filter: blur(100px);
            z-index: 1;
            transition: var(--transition);
        }

        body.active .spotlight {
            background: radial-gradient(circle, rgba(255, 143, 171, 0.3) 0%, transparent 70%);
            transform: scale(1.5);
        }

        /* --- НОВЫЙ СТИЛЬ ДЛЯ СЕРДЕЧЕК --- */
        .heart {
            position: absolute;
            color: var(--accent);
            opacity: 0;
            pointer-events: none;
            z-index: 2;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            20% { opacity: 0.4; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* КАРТОЧКА */
        .card-wrapper {
            position: relative;
            z-index: 10;
            perspective: 1000px;
        }

        .card {
            width: 320px;
            height: 460px;
            background: var(--card-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .card:active { transform: scale(0.97); }

        body.active .card {
            background: #ffffff;
            border-color: transparent;
            box-shadow: 0 40px 100px rgba(255, 143, 171, 0.25);
            height: 520px;
            width: 340px;
        }

        /* ТЕКСТ */
        .header-text {
            text-align: center;
            transition: var(--transition);
        }

        .header-text span {
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
            display: block;
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-style: italic;
            font-weight: 300;
            color: #fff;
            line-height: 1.1;
        }

        body.active h1 { color: #1a1a1a; font-weight: 600; }

        .reveal-content {
            max-height: 0;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s ease 0.3s;
            text-align: center;
        }

        body.active .reveal-content {
            max-height: 400px;
            opacity: 1;
            transform: translateY(0);
            margin-top: 40px;
        }

        .wish-text {
            font-size: 1rem;
            line-height: 1.8;
            color: #555;
            font-weight: 300;
        }

        .signature {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            color: var(--accent);
            margin-top: 30px;
            font-style: italic;
        }

        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            font-size: 9px;
            letter-spacing: 4px;
            color: #555;
            text-transform: uppercase;
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        body.active .hint { display: none; }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 8px;
            letter-spacing: 5px;
            color: #333;
            text-transform: uppercase;
        }
    </style>
</head>
<body id="body">

    <div class="spotlight"></div>

    <div class="card-wrapper" onclick="openCard()">
        <div class="card">
            <div class="header-text">
                <span>International</span>
                <h1>Поздравление <br> для Тебя</h1>
            </div>

            <div class="reveal-content">
                <p class="wish-text">
                    Пусть твоя жизнь будет <br>
                    наполнена легкостью, светом <br>
                    и бесконечным вдохновением. <br>
                    Цвети, сияй и оставайся <br>
                    самым прекрасным <br>
                    созданием в этом мире.
                </p>
                <div class="signature">С 8 Марта!</div>
            </div>

            <div class="hint">Коснись, чтобы открыть</div>
        </div>
    </div>

    <footer>Limited Edition &bull; 2026</footer>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤'; // Можно заменить на SVG для большей четкости
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = (Math.random() * 10 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        function openCard() {
            const body = document.getElementById('body');
            if (!body.classList.contains('active')) {
                body.classList.add('active');
                
                // Запуск генерации сердечек
                setInterval(createHeart, 300);

                // Эффект конфетти (нежный и "дорогой")
                const duration = 2 * 1000;
                const animationEnd = Date.now() + duration;
                const colors = ['#ff8fab', '#ffffff', '#ffd1dc'];

                (function frame() {
                    const timeLeft = animationEnd - Date.now();
                    if (timeLeft <= 0) return;

                    const particleCount = 2;
                    confetti({
                        particleCount,
                        origin: { x: Math.random(), y: Math.random() - 0.2 },
                        colors: colors,
                        startVelocity: 20,
                        spread: 360,
                        ticks: 60,
                        zIndex: 100
                    });
                    requestAnimationFrame(frame);
                }());
            }
        }
    </script>
</body>
</html>
